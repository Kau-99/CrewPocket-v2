name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    name: lint → typecheck → test → build
    runs-on: ubuntu-latest
    # Valores demo (espelho do .env.example/dev) — o prerender do `next build`
    # executa o client do Firebase no servidor e exige uma config presente.
    # Não são segredos; produção usa as env vars reais da Vercel.
    env:
      NEXT_PUBLIC_FIREBASE_API_KEY: demo-api-key
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: demo-crewpocket.firebaseapp.com
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: demo-crewpocket
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: demo-crewpocket.appspot.com
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
      NEXT_PUBLIC_FIREBASE_APP_ID: "1:000000000000:web:demo"
      NEXT_PUBLIC_RECAPTCHA_SITE_KEY: demo-recaptcha-key
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_USE_EMULATORS: "true"
      FIREBASE_ADMIN_PROJECT_ID: demo-crewpocket
      FIREBASE_ADMIN_CLIENT_EMAIL: demo@demo-crewpocket.iam.gserviceaccount.com
      FIREBASE_ADMIN_PRIVATE_KEY: demo-private-key
      STRIPE_SECRET_KEY: sk_test_demo
      STRIPE_WEBHOOK_SECRET: whsec_demo
      STRIPE_PRICE_SOLO_MONTHLY: price_demo_solo_monthly
      STRIPE_PRICE_SOLO_ANNUAL: price_demo_solo_annual
      STRIPE_PRICE_PRO_MONTHLY: price_demo_pro_monthly
      STRIPE_PRICE_PRO_ANNUAL: price_demo_pro_annual
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

  rules:
    name: firestore rules tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rules tests (emulator)
        run: pnpm test:rules
